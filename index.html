<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPPoE PRO LIVE DASHBOARD FIX</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background:#0b111e; color:#e2e8f0; }
#map { height:100%; width:100%; }
.marker-online { color:#22c55e; font-size:22px; }
.marker-offline { color:#ef4444; font-size:22px; }
.marker-moving { color:#eab308; font-size:24px; }
.add-mode-active { cursor: crosshair !important; }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

<header class="bg-slate-900 border-b border-slate-800 p-3 flex justify-between">
    <div>
        <h1 class="text-blue-400 font-bold text-sm">PPPoE LIVE ISP DASHBOARD</h1>
        <p class="text-xs text-slate-400">Realtime + Map Edit</p>
    </div>
</header>

<div class="flex flex-1 overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-80 bg-slate-900 p-3 flex flex-col gap-2">
    <input id="search" oninput="searchQuery=this.value.toLowerCase();render()"
    class="p-2 bg-slate-800 rounded text-xs" placeholder="Cari pelanggan...">

    <div id="list" class="flex-1 overflow-y-auto space-y-2"></div>

    <button onclick="toggleAddMode()" class="bg-blue-600 p-2 rounded text-xs font-bold">
        <i class="fa fa-plus"></i> Tambah Pelanggan
    </button>

    <p id="hint" class="text-xs text-yellow-400 hidden">Klik peta untuk tambah titik</p>
</aside>

<!-- MAP -->
<div id="map" class="flex-1"></div>

</div>

<script>
const map = L.map('map').setView([-5.1477,119.4327], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

let customers = [
 {id:1,name:"Pak Budi",ip:"10.10.1.2",status:"online",lat:-5.14,lng:119.43},
 {id:2,name:"Toko 1",ip:"10.10.1.3",status:"offline",lat:-5.15,lng:119.44}
];

let markerMap = {};
let searchQuery = "";
let addMode = false;
let tempLatLng = null;

function icon(status){
 return L.divIcon({
  html:`<i class="fa fa-home ${status==='online'?'marker-online':'marker-offline'}"></i>`
 });
}

function updatePopupContent(mk,c){
 mk.bindPopup(`<b>${c.name}</b><br>${c.ip}<br>${c.status}`);
}

function focusCustomer(id){
 const c = customers.find(x=>x.id===id);
 map.setView([c.lat,c.lng],16);
 markerMap[id].openPopup();
}

function toggleAddMode(){
 addMode=!addMode;
 document.getElementById("hint").style.display = addMode?"block":"none";
}

map.on("click",e=>{
 if(!addMode) return;
 tempLatLng=e.latlng;

 let name=prompt("Nama pelanggan?");
 if(!name) return;

 let ip=prompt("IP PPPoE?");
 if(!ip) return;

 customers.push({
  id:Date.now(),
  name,
  ip,
  status:"offline",
  lat:e.latlng.lat,
  lng:e.latlng.lng
 });

 addMode=false;
 document.getElementById("hint").style.display="none";
 render();
});

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";

 customers.forEach(c=>{
  if(searchQuery &&
   !c.name.toLowerCase().includes(searchQuery) &&
   !c.ip.includes(searchQuery)) return;

  if(!markerMap[c.id]){
    const mk=L.marker([c.lat,c.lng],{
      draggable:true,
      icon:icon(c.status)
    }).addTo(map);

    mk.on("dragend",e=>{
      const pos=e.target.getLatLng();
      c.lat=pos.lat;
      c.lng=pos.lng;
      render();
    });

    markerMap[c.id]=mk;
  } else {
    markerMap[c.id].setLatLng([c.lat,c.lng]);
  }

  updatePopupContent(markerMap[c.id],c);

  list.innerHTML+=`
  <div onclick="focusCustomer(${c.id})"
  class="bg-slate-800 p-2 rounded text-xs cursor-pointer">
    <b>${c.name}</b><br>
    <span class="text-gray-400">${c.ip}</span>
  </div>`;
 });

 document.getElementById("total").innerText=customers.length;
}

render();
</script>

</body>
</html>
