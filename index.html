<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Star.Net Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:10px; margin:0; }

h2 { text-align:center; font-size:18px; }

.topbar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px; flex-wrap:wrap; gap:10px;
}

.card {
  background:#fff; padding:15px; margin-bottom:15px;
  border-radius:8px; text-align:center; font-weight:bold;
  color:#28a745;
}

.form {
  background:#fff; padding:15px; border-radius:8px;
  margin-bottom:20px; display:flex; flex-wrap:wrap; gap:8px;
}

input, select {
  padding:10px; border:1px solid #ddd; border-radius:5px;
  flex:1 1 100%;
}

button {
  padding:10px; background:#007BFF; color:white;
  border:none; cursor:pointer; border-radius:5px;
  flex:1 1 auto;
}

button:hover { background:#0056b3; }

.table-wrapper { overflow-x:auto; }

table {
  width:100%; border-collapse:collapse; background:white;
  min-width:700px;
}

th, td {
  border:1px solid #ddd; padding:8px; text-align:center; font-size:12px;
}

th { background:#007BFF; color:white; }

.lunas { color:green; font-weight:bold; }
.belum { color:red; font-weight:bold; }

.hapus { background:red; color:white; padding:5px 8px; border-radius:4px; }

.edit { background:orange; color:white; padding:5px 8px; border-radius:4px; }

.wa-btn {
  background:green;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.btn-export { background:#dc3545; }

.login-box{
  max-width:300px;
  margin:100px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.hidden{ display:none; }

@media (max-width:600px){
  body{padding:8px;}
  h2{font-size:16px;}
  .form{flex-direction:column;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
  <h3>STAR.NET</h3>
  <input type="text" id="user" placeholder="Username"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="topbar">
  <h2>Dashboard WiFi STAR.NET</h2>
  <div>
    <button onclick="exportPDF()" class="btn-export">📄 Export PDF</button>
    <button onclick="logout()" style="background:black;color:white;">Logout</button>
  </div>
</div>

<div class="card">
  💰 Total Pemasukan: Rp <span id="total">0</span>
</div>

<div class="form">
  <input type="text" id="nama" placeholder="Nama Pelanggan">

  <select id="paket">
    <option value="60000">Paket 60k</option>
    <option value="70000">Paket 70K</option>
    <option value="100000">Paket 100K</option>
    <option value="150000">Paket 150K</option>
    <option value="200000">Paket 200K</option>
  </select>

  <select id="status">
    <option value="Lunas">Lunas</option>
    <option value="Belum">Belum Bayar</option>
  </select>

  <select id="alamat">
    <option value="bulo-buloa">Bulo-buloa</option>
    <option value="papanloe">Papanloe</option>
    <option value="bambalie">Bambalie</option>
  </select>

  <input type="text" id="wa" placeholder="Nomor WhatsApp">

  <button onclick="tambahData()" id="btnSubmit">Tambah</button>
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th>No</th>
  <th>Nama</th>
  <th>Paket</th>
  <th>Status</th>
  <th>Alamat</th>
  <th>WhatsApp</th>
  <th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

</div>

<script>
/* ===== LOGIN ===== */
function login(){
  let u = user.value;
  let p = pass.value;

  if(u === "admin" && p === "123"){
    localStorage.setItem("login","true");
    showApp();
  } else {
    alert("Login gagal!");
  }
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

if(localStorage.getItem("login") === "true"){
  showApp();
}

/* ===== DATA SYSTEM ===== */
let data = JSON.parse(localStorage.getItem("wifiData")) || [];
let editIndex = null;

function simpanData(){
  localStorage.setItem("wifiData", JSON.stringify(data));
}

function hitungTotal(){
  let total = 0;
  data.forEach(i=>{
    if(i.status==="Lunas") total += Number(i.paket);
  });
  document.getElementById("total").innerText =
    total.toLocaleString("id-ID");
}

function formatWA(num){
  if(!num) return "";
  num = num.toString().replace(/\D/g,"");
  if(num.startsWith("0")) num = "62"+num.substring(1);
  if(!num.startsWith("62")) num = "62"+num;
  return num;
}

function renderData(){
  let tabel = document.getElementById("tabel");
  tabel.innerHTML = "";

  data.forEach((item,index)=>{

    let statusClass = item.status==="Lunas"?"lunas":"belum";

    let waFix = formatWA(item.wa);
    let waLink = waFix
      ? `https://wa.me/${waFix}`
      : "#";

    tabel.innerHTML += `
    <tr>
      <td>${index+1}</td>
      <td>${item.nama}</td>
      <td>Rp ${Number(item.paket).toLocaleString()}</td>

      <td class="${statusClass}">
        <button onclick="toggleStatus(${index})"
          style="background:${item.status==='Lunas'?'green':'red'};color:white;border:none;padding:5px;">
          ${item.status}
        </button>
      </td>

      <td>${item.alamat}</td>

      <td>
        <button class="wa-btn" onclick="window.open('${waLink}','_blank')">
          WA
        </button>
      </td>

      <td>
        <button class="edit" onclick="editData(${index})">✏️</button>
        <button class="hapus" onclick="hapusData(${index})">X</button>
      </td>
    </tr>
    `;
  });

  hitungTotal();
}

function tambahData(){
  let obj = {
    nama: nama.value,
    paket: paket.value,
    wa: wa.value,
    alamat: alamat.value,
    status: status.value
  };

  if(editIndex === null){
    data.push(obj);
  }else{
    data[editIndex] = obj;
    editIndex = null;
    btnSubmit.innerText = "Tambah";
  }

  simpanData();
  renderData();
}

function editData(i){
  let d = data[i];
  nama.value = d.nama;
  paket.value = d.paket;
  wa.value = d.wa;
  alamat.value = d.alamat;
  status.value = d.status;

  editIndex = i;
  btnSubmit.innerText = "Update";
}

function toggleStatus(i){
  data[i].status = data[i].status==="Lunas"?"Belum":"Lunas";
  simpanData(); renderData();
}

function hapusData(i){
  data.splice(i,1);
  simpanData(); renderData();
}

function exportPDF(){
  html2pdf().from(document.body).save("tagihan-wifi.pdf");
}

renderData();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
