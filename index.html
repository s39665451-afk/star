<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPPoE Real-Time Dashboard</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { background:#0d1117; color:#c9d1d9; }
.sidebar { background:#161b22; }
#map { height:100%; width:100%; }

.leaflet-container {
    background:#0d1117;
}

/* dark tile effect */
.leaflet-tile {
    filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
}

.marker-online { background:green; }
.marker-offline { background:red; }
.marker-warning { background:orange; }
</style>
</head>

<body class="h-screen flex flex-col">

<header class="bg-[#161b22] p-2 text-xs flex justify-between">
    <div>🌐 PPPoE DASHBOARD ISP REALTIME</div>
    <div id="clock"></div>
</header>

<div class="flex flex-1">

<!-- SIDEBAR -->
<div class="sidebar w-80 p-3 overflow-auto">

    <div class="font-bold mb-2">Pelanggan</div>

    <div onclick="fokusKePelanggan(-5.1476,119.4327,'Pelanggan_A')" class="p-2 bg-[#21262d] mb-2 cursor-pointer">
        🏠 Pelanggan_A (ONLINE)
    </div>

    <div onclick="fokusKePelanggan(-5.1440,119.4390,'Pelanggan_B')" class="p-2 bg-[#21262d] mb-2 cursor-pointer">
        🏠 Pelanggan_B (OFFLINE)
    </div>

    <div onclick="fokusKePelanggan(-5.1400,119.4310,'Pelanggan_C')" class="p-2 bg-[#21262d] mb-2 cursor-pointer">
        🏠 Pelanggan_C (WARNING)
    </div>

</div>

<!-- MAP -->
<div id="map"></div>

</div>

<script>
// CLOCK
setInterval(()=>{
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

// INIT MAP
const map = L.map('map').setView([-5.145,119.435], 13);

// OSM TILE
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// DATA PELANGGAN
const pelanggan = [
    {
        name:"Pelanggan_A",
        lat:-5.1476,
        lng:119.4327,
        status:"online"
    },
    {
        name:"Pelanggan_B",
        lat:-5.1440,
        lng:119.4390,
        status:"offline"
    },
    {
        name:"Pelanggan_C",
        lat:-5.1400,
        lng:119.4310,
        status:"warning"
    }
];

// ICON FUNCTION
function icon(status){
    let color = "red";
    if(status==="online") color="green";
    if(status==="warning") color="orange";

    return L.divIcon({
        className:"",
        html:`<div style="
            background:${color};
            width:14px;height:14px;
            border-radius:50%;
            border:2px solid white;
            box-shadow:0 0 6px ${color};
        "></div>`
    });
}

// ADD MARKERS
let markers = {};

pelanggan.forEach(p=>{
    let m = L.marker([p.lat,p.lng],{icon:icon(p.status)})
    .addTo(map)
    .bindPopup(`<b>${p.name}</b><br>Status: ${p.status.toUpperCase()}`);

    markers[p.name] = m;
});

// FOKUS FUNCTION
function fokusKePelanggan(lat,lng,name){
    map.setView([lat,lng], 18);
    markers[name].openPopup();
}

</script>

</body>
</html>
